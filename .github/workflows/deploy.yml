name: Deploy Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DEPLOY_HOST: "10.23.1.53"
  DEPLOY_USER: "yjhwang"
  DEPLOY_PATH: "/home/yjhwang/aidc-work"

jobs:
  deploy-remote:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to 10.23.1.53
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}
            git pull origin main
            docker compose up -d --build
            docker compose ps
