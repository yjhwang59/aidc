services:
  web:
    build:
      context: .
      # APP_VERSION defaults to package.json version in Dockerfile
      args:
        APP_VERSION: ${APP_VERSION:-}
    image: aidc-work:latest
    env_file:
      - .env
    environment:
      TZ: Asia/Taipei
    ports:
      - "3163:80"
    restart: unless-stopped
